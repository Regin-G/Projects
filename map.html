<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            background-color:#19223f ;
        }
        .div{
            height: 90vh;
            width: 90%;
            border: 2px solid #7cf03d;
            border-radius: 20px;
            margin:40px auto;
            overflow: hidden;
        }
        .div:hover{
            box-shadow: 0 0 16px #7cf03d ;
            
        }
        .div img{
            height: 656px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="div">
        <img src="Interactivemap.png" alt="Theme park map">
    </div>
</body>
</html>
